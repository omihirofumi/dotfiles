[settings]
experimental = true
dotfiles.root = "~/.dotfiles"
dotfiles.default_mode = "symlink"

[tools]
codex = "latest"
"npm:@angular/language-server" = "latest"

[bootstrap.brew.taps]

[bootstrap.packages]
"brew:fzf" = "latest"
"brew:zinit" = "latest"
"brew:oh-my-posh" = "latest"
"brew:git" = "latest"
"brew:gh" = "latest"
"brew:lazygit" = "latest"
"brew:bat" = "latest"
"brew:eza" = "latest"
"brew:ripgrep" = "latest"
"brew:fd" = "latest"
"brew:jq" = "latest"
"brew:ghq" = "latest"
"brew:pet" = "latest"
"brew:rustup" = "latest"
"brew:docker" = "latest"
"brew:docker-buildx" = "latest"
"brew:docker-compose" = "latest"
"brew:docker-credential-helper" = "latest"
"brew:jj" = "latest"
"brew:jjui" = "latest"
"brew:ni" = "latest"
"brew:sops" = "latest"
"brew:tig" = "latest"
"brew:tldr" = "latest"
"brew:nb" = "latest"
"brew:difftastic" = "latest"
"brew:zls" = "latest"
"brew:zellij" = "latest"
"brew:git-delta" = "latest"
"brew:typescript-language-server" = "latest"
"brew:vscode-langservers-extracted" = "latest"
"brew:typescript" = "latest"
"brew:mole" = "latest"

[bootstrap.repos]
"~/.dotfiles" = { url = "https://github.com/omihirofumi/dotfiles", ref = "main" }

[dotfiles]
"~/.config/mise/config.toml" = "mise.toml"
"~/.zshrc" = ".zshrc"
"~/.gitconfig" = ".gitconfig"
"~/.config/git/ignore" = ".config/git/ignore"
"~/.tmux.conf" = ".tmux.conf"
"~/.config/direnv/direnv.toml" = ".config/direnv/direnv.toml"
"~/.config/negligible.omp.json" = ".config/negligible.omp.json"
"~/.ideavimrc" = ".ideavimrc"
"~/.local/bin" = { source = ".local/bin", mode = "symlink-each" }
"~/.config/karabiner" = ".config/karabiner"
"~/.config/ghostty" = ".config/ghostty"
"~/.config/helix/config.toml" = ".config/helix/config.toml"
"~/.config/helix/languages.toml" = ".config/helix/languages.toml"
"~/.config/jj" = ".config/jj"
"~/.config/jjui" = ".config/jjui"
"~/.claude/CLAUDE.md" = ".claude/CLAUDE.md"
"~/.claude/rules/interaction.md" = ".claude/rules/interaction.md"
"~/.claude/skills/deep-codebase-research/SKILL.md" = ".claude/skills/deep-codebase-research/SKILL.md"
"~/.claude/skills/output-plan-detailed/SKILL.md" = ".claude/skills/output-plan-detailed/SKILL.md"
"~/.codex/AGENTS.md" = ".config/codex/AGENTS.md"
"~/.config/zed/settings.json" = { source = ".config/zed/settings.json", mode = "symlink" }

[bootstrap.macos.dock]
autohide = true
show_recents = false
mru_spaces = false

[bootstrap.macos.finder]
show_pathbar = true
show_status_bar = true
preferred_view_style = "list"

[bootstrap.macos.keyboard]
key_repeat = 2
initial_key_repeat = 15
press_and_hold = false

[bootstrap.macos.defaults]
NSGlobalDomain = { "com.apple.trackpad.scaling" = 3.0, AppleShowAllExtensions = true }
"com.apple.finder" = { AppleShowAllExtensions = true }

[bootstrap.hooks.post-defaults]
run = 'defaults write com.mitchellh.ghostty NSUserKeyEquivalents -dict "Hide Ghostty" "@~$h"'

[tasks.bootstrap]
run = '''
mkdir -p ~/.config
touch ~/.config/favdirs

if command -v brew >/dev/null 2>&1; then
  # API metadata未公開のtapはmise bootstrap packagesで管理できないため直接インストール
  # ↑claudeの調査コピペ。真相は不明
  brew tap k1LoW/tap
  brew install k1LoW/tap/mo

  brew install --cask --force \
    1password \
    deskpad \
    ghostty \
    homerow \
    linear-linear \
    raindropio \
    raycast \
    karabiner-elements \
    google-chrome \
    chatgpt \
    jetbrains-toolbox \
    dbeaver-community \
    notion \
    rancher \
    zed \
    dockdoor \
    kotlin-lsp \
    font-jetbrains-mono-nerd-font
fi
'''
